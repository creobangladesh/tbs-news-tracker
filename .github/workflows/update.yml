name: Update News Feed

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install rss-parser --no-save

      - name: Fetch RSS and Generate JSON
        run: node fetch.js

      - name: Commit and Push Changes
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if data.json has changed
          if [[ -n $(git status -s data.json) ]]; then
            git add data.json
            git commit -m "Auto-update news feed: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes detected in data.json."
          fi
