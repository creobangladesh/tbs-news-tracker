<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amer.News</title>
    <style>
        /* (Use your existing styles) */
    </style>
</head>
<body>
    <script>
        // ... (Keep all your existing variables and helper functions) ...

        // NEW: Robust Hash Function
        function stringToHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0; 
            }
            return "card-" + Math.abs(hash).toString(16);
        }

        window.markRead = function(link) {
            if (!readArticles.includes(link)) {
                readArticles.push(link);
                localStorage.setItem('readArticles', JSON.stringify(readArticles));
                const cardId = stringToHash(link);
                const card = document.getElementById(cardId);
                if(card) card.classList.add('read');
            }
        }

        function buildCarouselHtml(items) {
            carouselTotal = items.length;
            currentSlide = 0;
            
            let slidesHtml = items.map((item, index) => {
                const isBookmarked = bookmarks.includes(item.link);
                const cardId = stringToHash(item.link);
                return `
                    <div class="carousel-slide ${index === 0 ? 'active' : ''}" id="slide-${index}">
                        <a href="${item.link}" target="_blank" onclick="markRead('${item.link}')" class="hero-full-link"></a>
                        <div class="card-image-wrap">
                            ${item.image ? `<img src="${item.image}" class="news-image">` : ''}
                            <div class="hero-overlay"></div>
                        </div>
                        <div class="news-content">
                            <div class="content-main">
                                <span class="tag" onclick="filterCategory('${item.category}')">${item.category}</span>
                                <a class="news-title" href="${item.link}" target="_blank" onclick="markRead('${item.link}')">${item.title}</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            // ... (rest of carousel logic)
        }

        function buildCardHtml(item) {
            const isRead = readArticles.includes(item.link);
            const isBookmarked = bookmarks.includes(item.link);
            const cardId = stringToHash(item.link);
            const snippet = item.snippet || '';
            
            const imageHtml = item.image 
                ? `<a href="${item.link}" target="_blank" onclick="markRead('${item.link}')" class="card-image-wrap"><img src="${item.image}" alt="Thumbnail" class="news-image" loading="lazy"></a>` 
                : `<div class="card-image-wrap" style="display:flex;align-items:center;justify-content:center;color:var(--muted-foreground);font-size:0.8rem;">No Image</div>`;

            return `
                <div id="${cardId}" class="news-card ${isRead ? 'read' : ''}">
                    ${imageHtml}
                    <div class="news-content">
                        <div class="content-main">
                            <div class="card-header">
                                <span class="tag" onclick="filterCategory('${item.category}')">${item.category}</span>
                                <button class="bookmark-btn ${isBookmarked ? 'saved' : ''}" data-link="${item.link}" onclick="toggleBookmark(event, '${item.link}')">
                                    ${isBookmarked ? svgBookmarkFilled : svgBookmarkEmpty}
                                </button>
                            </div>
                            <a class="news-title" href="${item.link}" target="_blank" onclick="markRead('${item.link}')">${item.title}</a>
                            <div class="snippet">${snippet}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        // ... (rest of your existing init and render logic)
    </script>
</body>
</html>
