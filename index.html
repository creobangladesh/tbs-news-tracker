<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amer.News</title>
    <style>
        :root { --background: #ffffff; --foreground: #09090b; --muted: #f4f4f5; --muted-foreground: #71717a; --border: #e4e4e7; --radius: 0.3rem; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--background); color: var(--foreground); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        #news-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .news-card { border: 1px solid var(--border); padding: 10px; border-radius: var(--radius); }
        .news-image { width: 100%; height: 150px; object-fit: cover; }
        .hero-carousel { grid-column: 1 / -1; height: 300px; background: #eee; position: relative; }
        .carousel-slide { display: none; }
        .carousel-slide.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div id="news-container"></div>
    </div>

    <script>
        let globalData = [];
        let filteredData = [];
        let readArticles = JSON.parse(localStorage.getItem('readArticles') || '[]');
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');

        function stringToHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return "card-" + Math.abs(hash).toString(16);
        }

        function buildCardHtml(item) {
            const cardId = stringToHash(item.link);
            return `
                <div id="${cardId}" class="news-card">
                    ${item.image ? `<img src="${item.image}" class="news-image">` : ''}
                    <h3>${item.title}</h3>
                    <p>${item.category}</p>
                </div>`;
        }

        function renderArticles() {
            const container = document.getElementById('news-container');
            container.innerHTML = filteredData.map(item => buildCardHtml(item)).join('');
        }

        async function init() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                const data = await response.json();
                globalData = data.news || [];
                filteredData = globalData;
                renderArticles();
            } catch (e) {
                console.error("Failed to load", e);
            }
        }

        init();
    </script>
</body>
</html>
