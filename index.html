<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amer.News</title>
    <script>
        // System theme detection
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const savedTheme = localStorage.getItem('theme') || (systemPrefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root { --background: #ffffff; --foreground: #09090b; --muted: #f4f4f5; --muted-foreground: #71717a; --border: #e4e4e7; --accent: #f4f4f5; --radius: 0.3rem; }
        [data-theme="dark"] { --background: #09090b; --foreground: #fafafa; --muted: #27272a; --muted-foreground: #a1a1aa; --border: #27272a; --accent: #27272a; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--foreground); transition: background 0.2s, color 0.2s; line-height: 1.5; }
        .container { margin: 0 auto; width: 95%; padding: 15px 0; max-width: 1600px; }
        @media (min-width: 1024px) { .container { width: 85%; } }

        /* Navigation & Mobile */
        @media (max-width: 767px) { .desktop-only { display: none !important; } }
        
        /* Carousel Logic */
        .hero-carousel { background: #000; position: relative; height: 450px; }
        .carousel-nav { display: none !important; }
        .carousel-slide .hero-overlay { background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); }
        .carousel-slide .news-content { padding: 40px; padding-bottom: 80px; }
        
        /* Links & Typography */
        .snippet-link { text-decoration: none !important; color: inherit; display: block; }
        .snippet-link:hover { text-decoration: none !important; }
        .snippet { text-decoration: none !important; color: var(--muted-foreground); }
        
        /* Add your original CSS structure here to maintain your specific UI components */
    </style>
</head>
<body>
    <div class="sticky-wrapper"><div class="container"></div></div>
    <div class="container">
        <div id="news-container" class="layout-grid-4"></div>
    </div>

    <script>
        // --- YOUR ORIGINAL DATA & STATE ---
        let globalData = [];
        let filteredData = [];
        let readArticles = JSON.parse(localStorage.getItem('readArticles') || '[]');
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
        
        // --- UPDATED RENDERING FUNCTION ---
        function buildCardHtml(item) {
            const isRead = readArticles.includes(item.link);
            const isBookmarked = bookmarks.includes(item.link);
            const cardId = `card-${btoa(item.link).replace(/=/g,'')}`;
            
            return `
                <div id="${cardId}" class="news-card ${isRead ? 'read' : ''}">
                    ${item.image ? `<a href="${item.link}" target="_blank" onclick="markRead('${item.link}')" class="card-image-wrap"><img src="${item.image}" class="news-image" loading="lazy"></a>` : ''}
                    <div class="news-content">
                        <div class="content-main">
                            <a href="${item.link}" target="_blank" onclick="markRead('${item.link}')" class="snippet-link">
                                <div class="news-title">${item.title}</div>
                                <div class="snippet">${item.snippet || ''}</div>
                            </a>
                            <div class="meta" style="margin-top:10px;">
                                <span>${getRelativeTime(item.pubDate)}</span>
                                <span class="tag" onclick="filterCategory('${item.category}')">${item.category}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- INCLUDE ALL YOUR OTHER ORIGINAL FUNCTIONS: init(), renderArticles(), applyFiltersAndSort(), etc. ---
        
        init();
    </script>
</body>
</html>
