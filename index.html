<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBS News Aggregator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f0f2f5; color: #333; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 25px; }
        
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .news-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s ease; display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        
        .news-image { width: 100%; height: 180px; object-fit: cover; background: #e9ecef; border-bottom: 1px solid #eee; }
        .news-content { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        
        .news-title { display: block; color: #1a1a1a; text-decoration: none; font-size: 1.15rem; font-weight: 700; margin: 12px 0; line-height: 1.4; }
        .news-title:hover { color: #0056b3; }
        
        .meta { color: #666; font-size: 0.85rem; margin-top: auto; display: flex; justify-content: space-between; align-items: center; }
        .category-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; width: fit-content; }
    </style>
</head>
<body>
    <header>
        <h1>TBS News Explorer</h1>
        <div id="updated-at" style="font-size: 0.9rem; color: #666;">Syncing...</div>
    </header>

    <div id="news-container" class="news-grid"></div>

    <script>
        async function fetchNews() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                document.getElementById('updated-at').innerText = `Last sync: ${new Date(data.updatedAt).toLocaleTimeString()}`;
                const container = document.getElementById('news-container');
                container.innerHTML = ''; 

                data.news.forEach(item => {
                    // Check if an image exists. If not, use a blank placeholder or skip it.
                    const imageHtml = item.image 
                        ? `<img src="${item.image}" alt="News thumbnail" class="news-image" loading="lazy">` 
                        : `<div class="news-image" style="display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 0.8rem;">No Image</div>`;

                    container.innerHTML += `
                        <div class="news-card">
                            ${imageHtml}
                            <div class="news-content">
                                <span class="category-badge" style="background-color: ${item.bg}; color: ${item.color};">
                                    ${item.icon} ${item.category}
                                </span>
                                <a class="news-title" href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
                                <div class="meta">
                                    <span>${new Date(item.pubDate).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('news-container').innerHTML = '<p>Loading feeds...</p>';
            }
        }
        
        fetchNews();
        setInterval(fetchNews, 30 * 60 * 1000); 
    </script>
</body>
</html>
