<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amer Habib's News</title>
    <link rel="icon" type="image/jpeg" href="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <style>
        :root { --background: #ffffff; --foreground: #09090b; --muted: #f4f4f5; --muted-foreground: #71717a; --border: #e4e4e7; --radius: 0.3rem; }
        [data-theme="dark"] { --background: #09090b; --foreground: #fafafa; --muted: #27272a; --muted-foreground: #a1a1aa; --border: #27272a; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--foreground); line-height: 1.5; }
        
        /* Sticky Header */
        .sticky-wrapper { position: sticky; top: 0; background: var(--background); z-index: 100; border-bottom: 1px solid var(--border); padding: 10px 0; }
        .container { margin: 0 auto; width: 95%; max-width: 1600px; }
        
        header { padding-bottom: 5px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .logo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 1.25rem; font-weight: 800; }
        .utility-zone { display: flex; gap: 10px; }
        
        .icon-btn { background: none; border: none; color: var(--foreground); cursor: pointer; padding: 6px; opacity: 0.7; }
        
        #search-container { display: none; padding-top: 10px; }
        .search-box { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--background); color: var(--foreground); }

        .controls-row { display: flex; gap: 15px; align-items: center; margin: 20px 0; }
        
        /* Mobile Layout Toggle Rules */
        .layout-segmented { display: flex; background: var(--muted); padding: 4px; border-radius: var(--radius); }
        .seg-btn { padding: 6px 12px; border: none; background: transparent; color: var(--muted-foreground); cursor: pointer; border-radius: var(--radius); font-size: 0.8rem; }
        .seg-btn.active { background: var(--background); color: var(--foreground); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        @media (max-width: 767px) {
            .hide-mobile { display: none !important; }
        }

        .filter-accordion { margin-bottom: 20px; }
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .capsule { background: var(--muted); padding: 4px 12px; border-radius: 99px; cursor: pointer; font-size: 0.8rem; border: none; }
        .capsule.active { background: var(--foreground); color: var(--background); }

        .layout-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 767px) { .layout-grid-3 { grid-template-columns: 1fr; } }
        
        .news-card { display: flex; flex-direction: column; }
        .card-image-wrap { width: 100%; height: 200px; background: var(--muted); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
        .news-image { width: 100%; height: 100%; object-fit: cover; }
        .news-title { font-size: 1rem; font-weight: 700; color: var(--foreground); text-decoration: none; }
        .snippet { font-size: 0.85rem; color: var(--muted-foreground); margin: 8px 0; -webkit-line-clamp: 3; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { font-size: 0.75rem; color: var(--muted-foreground); }
        
        .back-to-top { position: fixed; bottom: 30px; right: 30px; background: var(--foreground); color: var(--background); width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="sticky-wrapper">
        <div class="container">
            <header>
                <div class="header-top">
                    <div class="brand-zone">
                        <img src="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg" alt="Logo" class="logo">
                        <h1>Amer Habib's News</h1>
                    </div>
                    <div class="utility-zone">
                        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
                        <button class="icon-btn" onclick="init()">↻</button>
                        <button id="theme-btn" class="icon-btn" onclick="toggleTheme()">☀</button>
                    </div>
                </div>
                <div id="search-container"><input type="text" id="search-box" class="search-box" placeholder="Search..." oninput="handleSearch()"></div>
            </header>
        </div>
    </div>

    <div class="container">
        <div class="controls-row">
            <div class="layout-segmented">
                <button class="seg-btn active" onclick="setView('grid-3', this)">Grid</button>
                <button class="seg-btn hide-mobile" onclick="setView('grid-2', this)">2 Col</button>
                <button class="seg-btn hide-mobile" onclick="setView('grid-4', this)">4 Col</button>
                <button class="seg-btn" onclick="setView('text', this)">Text</button>
            </div>
        </div>

        <details class="filter-accordion"><summary>Categories</summary><div id="filter-container" class="filter-bar"></div></details>
        <div id="news-container" class="layout-grid-3"></div>
        <button id="load-more-btn" class="load-more" onclick="loadMore()">Load More</button>
    </div>
    <button id="back-to-top" class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

    <script>
        let globalData = [], filteredData = [], currentDisplayed = 13, currentView = 'grid-3';
        
        function setView(viewType, btn) {
            currentView = viewType;
            document.getElementById('news-container').className = 'layout-' + viewType;
            document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            render();
        }

        function render() {
            document.getElementById('news-container').innerHTML = filteredData.slice(0, currentDisplayed).map(item => `
                <div class="news-card">
                    ${currentView !== 'text' ? `<div class="card-image-wrap"><img src="${item.image}" class="news-image"></div>` : ''}
                    <div class="news-content">
                        <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                        <div class="snippet">${item.snippet}</div>
                        <div class="meta">${new Date(item.pubDate).toLocaleDateString()}</div>
                    </div>
                </div>
            `).join('');
        }

        async function init() {
            const res = await fetch('./data.json?t=' + Date.now());
            const data = await res.json();
            globalData = data.news;
            filteredData = globalData;
            if(document.getElementById('filter-container').innerHTML === "") {
                const cats = ['All', ...new Set(globalData.map(i => i.category))];
                document.getElementById('filter-container').innerHTML = cats.map(c => `<button class="capsule ${c==='All'?'active':''}" onclick="filterCat('${c}', this)">${c}</button>`).join('');
            }
            render();
        }
        
        function filterCat(c, btn) {
            document.querySelectorAll('.capsule').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filteredData = c === 'All' ? globalData : globalData.filter(i => i.category === c);
            render();
        }

        window.onscroll = () => document.getElementById('back-to-top').style.display = window.scrollY > 400 ? 'flex' : 'none';
        init();
    </script>
</body>
</html>
