<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:title" content="Amer Habib's News">
    <meta property="og:description" content="The latest daily news curated and delivered in real-time.">
    <meta property="og:image" content="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg">
    <meta property="og:url" content="https://news.amerhabib.com/">
    <meta name="twitter:card" content="summary_large_image">
    
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amer Habib's News</title>
    
    <link rel="icon" type="image/jpeg" href="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <style>
        :root { --background: #ffffff; --foreground: #09090b; --muted: #f4f4f5; --muted-foreground: #71717a; --border: #e4e4e7; --radius: 0.3rem; }
        [data-theme="dark"] { --background: #09090b; --foreground: #fafafa; --muted: #27272a; --muted-foreground: #a1a1aa; --border: #27272a; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--foreground); line-height: 1.5; }
        
        /* Sticky & Tight Header */
        .sticky-header { position: sticky; top: 0; background: var(--background); z-index: 1000; border-bottom: 1px solid var(--border); padding: 8px 0; }
        .container { margin: 0 auto; width: 95%; max-width: 1600px; }
        
        header { padding: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        
        .brand-zone { display: flex; align-items: center; gap: 10px; }
        .logo { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 1.1rem; font-weight: 800; }

        .utility-zone { display: flex; align-items: center; gap: 5px; }
        .icon-btn { background: none; border: none; color: var(--foreground); cursor: pointer; padding: 4px; opacity: 0.7; }
        
        #search-container { display: none; padding-top: 8px; }
        .search-box { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--background); color: var(--foreground); font-size: 0.9rem; }
        
        .controls-row { display: flex; gap: 15px; align-items: center; margin: 15px 0; }
        .select-box { background: transparent; border: none; padding: 4px; font-weight: 600; cursor: pointer; }
        
        .layout-segmented { display: flex; background: var(--muted); padding: 3px; border-radius: var(--radius); }
        .seg-btn { padding: 4px 10px; border: none; background: transparent; color: var(--muted-foreground); cursor: pointer; font-size: 0.8rem; border-radius: calc(var(--radius) - 1px); }
        .seg-btn.active { background: var(--background); color: var(--foreground); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .filter-accordion { margin-bottom: 15px; font-size: 0.85rem; }
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .capsule { background: var(--muted); padding: 3px 10px; border-radius: 99px; cursor: pointer; font-size: 0.75rem; border: none; }
        .capsule.active { background: var(--foreground); color: var(--background); }

        .layout-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .news-card { display: flex; flex-direction: column; }
        .card-image-wrap { width: 100%; height: 180px; background: var(--muted); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
        .news-image { width: 100%; height: 100%; object-fit: cover; }
        .news-title { font-size: 1rem; font-weight: 700; color: var(--foreground); text-decoration: none; }
        .snippet { font-size: 0.8rem; color: var(--muted-foreground); margin: 6px 0; -webkit-line-clamp: 3; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }
        
        .hero-card { grid-column: 1 / -1; height: 350px; position: relative; border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; color: #fff; }
        .hero-full-link { position: absolute; top:0; left:0; width:100%; height:100%; z-index:10; }
        .hero-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(transparent, rgba(0,0,0,0.8)); z-index: 1; }
        .hero-content { position: relative; z-index: 2; }
        
        .back-to-top { position: fixed; bottom: 20px; right: 20px; background: var(--foreground); color: var(--background); width: 35px; height: 35px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 50; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <div class="container">
            <header>
                <div class="header-top">
                    <div class="brand-zone">
                        <img src="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg" alt="Logo" class="logo">
                        <h1>Amer Habib's News</h1>
                    </div>
                    <div class="utility-zone">
                        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
                        <button class="icon-btn" onclick="init()">↻</button>
                        <button id="theme-btn" class="icon-btn" onclick="toggleTheme()">☀</button>
                    </div>
                </div>
                <div id="search-container"><input type="text" id="search-box" class="search-box" placeholder="Search..." oninput="handleSearch()"></div>
            </header>
        </div>
    </div>

    <div class="container">
        <div class="controls-row">
            <select id="sort-box" class="select-box" onchange="handleSort()"><option value="newest">Newest</option><option value="oldest">Oldest</option></select>
            <div class="layout-segmented">
                <button class="seg-btn" onclick="setView('grid-2', this)">2 Col</button>
                <button class="seg-btn active" onclick="setView('grid-4', this)">Grid</button>
                <button class="seg-btn" onclick="setView('text', this)">Text</button>
            </div>
        </div>

        <details class="filter-accordion"><summary>Categories</summary><div id="filter-container" class="filter-bar"></div></details>
        <div id="news-container" class="layout-grid-4"></div>
        <button id="load-more-btn" class="load-more" onclick="loadMore()">Load More</button>
    </div>
    <button id="back-to-top" class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

    <script>
        let globalData = [], filteredData = [], currentDisplayed = 13, currentView = 'grid-4';
        
        function setView(viewType, btn) {
            currentView = viewType;
            document.getElementById('news-container').className = 'layout-' + viewType;
            document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            renderArticles();
        }

        function renderArticles() {
            const container = document.getElementById('news-container');
            const items = filteredData.slice(0, currentDisplayed);
            let html = '';
            
            // Hero Logic: Only show if filtering/searching is off
            const isHeroMode = (currentView === 'grid-4' && !document.getElementById('search-box').value && document.getElementById('sort-box').value === 'newest');
            
            if(isHeroMode && items.length > 0) {
                html += `
                    <div class="hero-card">
                        <a href="${items[0].link}" target="_blank" class="hero-full-link"></a>
                        <div class="card-image-wrap" style="position:absolute; top:0; left:0; width:100%; height:100%; margin:0;"><img src="${items[0].image}" class="news-image"></div>
                        <div class="hero-overlay"></div>
                        <div class="hero-content"><h2>${items[0].title}</h2></div>
                    </div>`;
                items.slice(1).forEach(item => html += buildCard(item));
            } else {
                items.forEach(item => html += buildCard(item));
            }
            container.innerHTML = html;
        }

        function buildCard(item) {
            return `
                <div class="news-card">
                    ${currentView !== 'text' ? `<div class="card-image-wrap"><img src="${item.image}" class="news-image"></div>` : ''}
                    <div class="news-content">
                        <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                        <div class="snippet">${item.snippet}</div>
                    </div>
                </div>`;
        }

        async function init() {
            const res = await fetch('./data.json?t=' + Date.now());
            const data = await res.json();
            globalData = data.news;
            filteredData = globalData;
            renderArticles();
        }
        
        window.toggleSearch = () => { const el = document.getElementById('search-container'); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };
        init();
    </script>
</body>
</html>
