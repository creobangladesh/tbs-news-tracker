<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amer's News</title>
    <style>
        /* [ ... Keep your existing CSS variables and styles here ... ] */
        
        /* New Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal-content { background: var(--bg-card); width: 80%; margin: 50px auto; padding: 40px; border: 1px solid var(--border); position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 2rem; }
        
        /* Card Tweaks */
        .snippet { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .read-btn { cursor: pointer; background: var(--capsule); border: none; padding: 8px; margin-top: 10px; width: 100%; color: var(--text-main); font-weight: 600; }
    </style>
</head>
<body>

    <!-- Modal Pop-up -->
    <div id="article-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body">Loading article...</div>
        </div>
    </div>

    <!-- [ ... Your existing HTML content ... ] -->

    <script>
        // ... (Keep existing JS logic) ...

        // NEW: Modal Logic
        window.openModal = async function(link) {
            const modal = document.getElementById('article-modal');
            const body = document.getElementById('modal-body');
            modal.style.display = 'block';
            body.innerHTML = 'Fetching article...';

            try {
                const response = await fetch(link);
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                // Target the main article body of TBS (standard selector)
                const content = doc.querySelector('.article-content') || doc.querySelector('article') || doc.body;
                body.innerHTML = content.innerHTML;
            } catch (e) {
                body.innerHTML = 'Could not load article directly. <a href="'+link+'" target="_blank">Click here to read on site</a>';
            }
        }

        window.closeModal = function() {
            document.getElementById('article-modal').style.display = 'none';
        }

        // Updated buildCardHtml function to include snippet and button
        function buildCardHtml(item, isHero = false) {
            // ... (keep existing card structure)
            return `
                <div class="news-card">
                    ${imageHtml}
                    <div class="news-content">
                        <!-- ... -->
                        <div class="snippet">${item.snippet}</div>
                        <button class="read-btn" onclick="openModal('${item.link}')">Read Here</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
